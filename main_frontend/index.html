<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>MyR - DMZ Architecture</title>
  </head>
  <body>
    <div id="root"><p id="html-load-marker">Loading...</p></div>
    <script>
      window.__showLoadError = function(msg) {
        var r = document.getElementById('root');
        if (r) r.innerHTML = '<p style="padding:1rem;font-family:monospace;color:#c00;">' + msg + '</p>';
      };
      window.addEventListener('error', function(e) { window.__showLoadError(e.message + ' at ' + (e.filename || '') + ':' + (e.lineno || '')); return false; });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
