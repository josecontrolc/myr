version: '3.8'

networks:
  dmz_net:
    driver: bridge
  internal_net:
    driver: bridge
    # DEVELOPMENT: internal set to false to allow Prisma CLI access from host
    # PRODUCTION: Change to 'internal: true' for maximum security
    internal: false

services:
  postgres:
    image: postgres:16-alpine
    container_name: database
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-myrtest}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Expose port for local development and Prisma CLI
      # Comment out this line in production for maximum security
      - "5432:5432"
    networks:
      - internal_net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      # Expose Prisma Studio port for development
      - "5555:5555"
    networks:
      - internal_net
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_app
    environment:
      NODE_ENV: ${NODE_ENV:-development}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - dmz_net
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: reverse_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - dmz_net
      - internal_net
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
