networks:
  dmz_net:
    driver: bridge
  internal_net:
    driver: bridge
    # DEVELOPMENT: internal set to false to allow Prisma CLI access from host
    # PRODUCTION: Change to 'internal: true' for maximum security
    internal: false

services:
  postgres:
    image: postgres:16-alpine
    container_name: database
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-myrtest}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Expose port for local development and Prisma CLI
      # Comment out this line in production for maximum security
      - "5432:5432"
    networks:
      - internal_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-myrtest}"]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS}
      ADMIN_SECRET: ${ADMIN_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      EMAIL_SERVICE_URL: ${EMAIL_SERVICE_URL:-http://email_service:3001}
      EMAIL_SERVICE_SECRET: ${EMAIL_SERVICE_SECRET}
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      # Expose Prisma Studio port for development
      - "5555:5555"
    networks:
      - internal_net
    depends_on:
      postgres:
        condition: service_healthy
      email_service:
        condition: service_started
    restart: unless-stopped

  main_frontend:
    build:
      context: ./main_frontend
      dockerfile: Dockerfile
    container_name: main_frontend_app
    environment:
      NODE_ENV: ${NODE_ENV:-development}
    volumes:
      - ./main_frontend:/app
      - /app/node_modules
      - ./shared:/app/shared
    networks:
      - dmz_net
    restart: unless-stopped

  admin_frontend:
    build:
      context: ./admin_frontend
      dockerfile: Dockerfile
    container_name: admin_frontend_app
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      VITE_ADMIN_SECRET: ${ADMIN_SECRET}
      VITE_API_URL: ""
    volumes:
      - ./admin_frontend:/app
      - /app/node_modules
      - ./shared:/app/shared
    networks:
      - dmz_net
    restart: unless-stopped

  email_service:
    build:
      context: ./email_service
      dockerfile: Dockerfile
    container_name: email_service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      EMAIL_SERVICE_PORT: ${EMAIL_SERVICE_PORT:-3001}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL}
      EMAIL_SERVICE_SECRET: ${EMAIL_SERVICE_SECRET}
    volumes:
      - ./email_service:/app
      - /app/node_modules
    networks:
      - internal_net
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: reverse_proxy
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - dmz_net
      - internal_net
    depends_on:
      - backend
      - main_frontend
      - admin_frontend
    restart: unless-stopped

volumes:
  postgres_data:
